name: Setup KernelSU-Next
description: Setup pinned official KernelSU-Next source

inputs:
  ksu_ref:
    description: KernelSU-Next branch, tag or commit
    required: false
    default: next

  apply_static_patch:
    description: Apply repository-specific static.patch
    required: false
    default: "false"

runs:
  using: composite

  steps:
    - name: Install KernelSU-Next
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_REF="${{ inputs.ksu_ref }}"
        SETUP_URL="https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh"

        echo "Installing official KernelSU-Next..."
        echo "Requested ref: ${KSU_REF}"

        rm -rf KernelSU-Next

        curl \
          --fail \
          --location \
          --silent \
          --show-error \
          "$SETUP_URL" |
          bash -s "$KSU_REF"

        test -d KernelSU-Next/.git || {
          echo "::error::KernelSU-Next repository was not created."
          exit 1
        }

        test -f KernelSU-Next/kernel/Kconfig || {
          echo "::error::KernelSU-Next kernel/Kconfig not found."
          exit 1
        }

        ACTUAL_COMMIT="$(git -C KernelSU-Next rev-parse HEAD)"

        echo "KernelSU-Next commit: ${ACTUAL_COMMIT}"
        echo "KSU_ACTUAL_COMMIT=${ACTUAL_COMMIT}" >> "$GITHUB_ENV"

    - name: Set KernelSU version information
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        set -euo pipefail

        COMMITS_COUNT="$(git rev-list --count HEAD)"
        KSU_VERSION="$((30000 + COMMITS_COUNT))"
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.1)"
        KSU_COMMIT="$(git rev-parse --short HEAD)"

        if grep -q '^KSU_VERSION_FALLBACK := ' kernel/Kbuild; then
          sed -i \
            "s/^KSU_VERSION_FALLBACK := .*/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" \
            kernel/Kbuild
        fi

        if grep -q '^KSU_VERSION_TAG_FALLBACK := ' kernel/Kbuild; then
          sed -i \
            "s/^KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" \
            kernel/Kbuild
        fi

        {
          echo "KSU_VERSION=${KSU_VERSION}"
          echo "KSU_GIT_TAG=${KSU_GIT_TAG}"
          echo "KSU_COMMIT=${KSU_COMMIT}"
        } >> "$GITHUB_ENV"

        echo "KernelSU version: ${KSU_VERSION}"
        echo "KernelSU tag: ${KSU_GIT_TAG}"
        echo "KernelSU commit: ${KSU_COMMIT}"

    - name: Apply repository static patch
      if: inputs.apply_static_patch == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        set -euo pipefail

        STATIC_PATCH="${{ github.action_path }}/patches/static.patch"

        test -f "$STATIC_PATCH" || {
          echo "::error::static.patch not found."
          exit 1
        }

        if ! patch \
          --dry-run \
          --batch \
          --forward \
          -p1 < "$STATIC_PATCH"; then
          echo "::error::static.patch is incompatible with selected KernelSU commit."
          exit 1
        fi

        patch \
          --batch \
          --forward \
          -p1 < "$STATIC_PATCH"

    - name: Enable KernelSU config
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
