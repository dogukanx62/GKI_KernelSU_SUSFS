name: Apply Super-Builders KernelSU-Next ZeroMount
description: Apply pinned SUSFS, KSU integration and ZeroMount patch stack

inputs:
  version:
    description: Kernel version combination, for example android14-6.1
    required: true

  android_version:
    description: Android version, for example android14
    required: true

  kernel_version:
    description: Kernel version, for example 6.1
    required: true

  sublevel:
    description: Kernel sublevel, for example 145
    required: true

  super_builders_ref:
    description: Super-Builders branch, tag or commit
    required: false
    default: main

runs:
  using: composite

  steps:
    - name: Download Super-Builders
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ inputs.version }}" != "android14-6.1" ]]; then
          echo "::error::This action currently supports only android14-6.1."
          exit 1
        fi

        if [[ "${{ inputs.sublevel }}" != "145" ]]; then
          echo "::error::This action is restricted to kernel 6.1.145."
          exit 1
        fi

        SB_DIR="${RUNNER_TEMP}/Super-Builders"
        SB_REF="${{ inputs.super_builders_ref }}"

        rm -rf "$SB_DIR"
        mkdir -p "$SB_DIR"

        git -C "$SB_DIR" init
        git -C "$SB_DIR" remote add origin \
          https://github.com/Enginex0/Super-Builders.git

        git -C "$SB_DIR" fetch \
          --depth=1 \
          origin \
          "$SB_REF"

        git -C "$SB_DIR" checkout --detach FETCH_HEAD

        echo "SUPER_BUILDERS_DIR=${SB_DIR}" >> "$GITHUB_ENV"

    - name: Verify clean kernel and pinned KernelSU
      shell: bash
      run: |
        set -euo pipefail

        KERNEL_DIR="${{ github.workspace }}/kernel/common"
        KSU_DIR="${{ github.workspace }}/kernel/KernelSU-Next"
        SB_BASE="${SUPER_BUILDERS_DIR}/android14-6.1"
        PIN_FILE="${SB_BASE}/kernelsu-next-pin.txt"

        test -d "$KERNEL_DIR" || {
          echo "::error::Kernel common directory not found."
          exit 1
        }

        test -d "$KSU_DIR/.git" || {
          echo "::error::Official KernelSU-Next repository not found."
          exit 1
        }

        test -f "$PIN_FILE" || {
          echo "::error::KernelSU-Next pin file not found."
          exit 1
        }

        # The normal SUSFS action must not run before this action.
        if [[ -f "${KERNEL_DIR}/fs/susfs.c" ]] ||
           [[ -f "${KERNEL_DIR}/include/linux/susfs.h" ]]; then
          echo "::error::SUSFS is already present in the kernel tree."
          echo "::error::Disable the normal SUSFS action for the ZeroMount target."
          exit 1
        fi

        EXPECTED_COMMIT="$(tr -d '[:space:]' < "$PIN_FILE")"
        ACTUAL_COMMIT="$(git -C "$KSU_DIR" rev-parse HEAD)"

        echo "Expected KernelSU commit: ${EXPECTED_COMMIT}"
        echo "Actual KernelSU commit:   ${ACTUAL_COMMIT}"

        if [[ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]]; then
          echo "::error::KernelSU-Next commit does not match Super-Builders pin."
          echo "::error::Pass the contents of kernelsu-next-pin.txt as ksu_ref."
          exit 1
        fi

    - name: Apply complete patch stack
      shell: bash
      run: |
        set -euo pipefail

        KERNEL_DIR="${{ github.workspace }}/kernel/common"
        KSU_DIR="${{ github.workspace }}/kernel/KernelSU-Next"

        SB_BASE="${SUPER_BUILDERS_DIR}/android14-6.1"
        PATCH_DIR="${SB_BASE}/KernelSU-Next/patches"

        PATCH_50="${PATCH_DIR}/50_add_susfs_in_gki-android14-6.1.patch"
        PATCH_51="${PATCH_DIR}/51_enhanced_susfs-android14-6.1.patch"
        PATCH_70="${PATCH_DIR}/70_ksu_safety-kernelsu-next-6.1.patch"
        PATCH_60="${PATCH_DIR}/60_zeromount-android14-6.1.patch"

        for PATCH_FILE in \
          "$PATCH_50" \
          "$PATCH_51" \
          "$PATCH_70" \
          "$PATCH_60"; do

          test -f "$PATCH_FILE" || {
            echo "::error::Required patch not found: $PATCH_FILE"
            exit 1
          }
        done

        apply_patch()
        {
          local TARGET_DIR="$1"
          local PATCH_FILE="$2"
          local PATCH_NAME="$3"

          echo
          echo "=================================================="
          echo "Checking ${PATCH_NAME}"
          echo "Target: ${TARGET_DIR}"
          echo "Patch:  ${PATCH_FILE}"
          echo "=================================================="

          if ! (
            cd "$TARGET_DIR"
            patch \
              --dry-run \
              --batch \
              --forward \
              -p1 < "$PATCH_FILE"
          ); then
            echo "::error::${PATCH_NAME} is incompatible with the current source tree."
            exit 1
          fi

          (
            cd "$TARGET_DIR"
            patch \
              --batch \
              --forward \
              -p1 < "$PATCH_FILE"
          )

          echo "${PATCH_NAME}: applied successfully"
        }

        # Required Super-Builders order:
        # 50 -> 51 -> 70 -> 60

        apply_patch \
          "$KERNEL_DIR" \
          "$PATCH_50" \
          "50 - Base SUSFS"

        apply_patch \
          "$KERNEL_DIR" \
          "$PATCH_51" \
          "51 - Enhanced SUSFS"

        apply_patch \
          "$KSU_DIR" \
          "$PATCH_70" \
          "70 - KernelSU-Next integration"

        apply_patch \
          "$KERNEL_DIR" \
          "$PATCH_60" \
          "60 - ZeroMount"

    - name: Run SUSFS compatibility helper
      shell: bash
      run: |
        set -euo pipefail

        KERNEL_DIR="${{ github.workspace }}/kernel/common"
        SB_BASE="${SUPER_BUILDERS_DIR}/android14-6.1"
        PATCH_DIR="${SB_BASE}/KernelSU-Next/patches"
        HELPER="${SB_BASE}/build-helpers/fix-susfs-compat.sh"

        test -f "$HELPER" || {
          echo "::error::fix-susfs-compat.sh not found."
          exit 1
        }

        chmod +x "$HELPER"

        "$HELPER" \
          "$KERNEL_DIR" \
          "${{ inputs.sublevel }}" \
          "${{ inputs.android_version }}" \
          "${{ inputs.kernel_version }}" \
          "$PATCH_DIR"

    - name: Enable SUSFS and ZeroMount configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_ZEROMOUNT=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y

    - name: Validate complete integration
      shell: bash
      run: |
        set -euo pipefail

        KERNEL_DIR="${{ github.workspace }}/kernel/common"
        KSU_DIR="${{ github.workspace }}/kernel/KernelSU-Next"

        test -f "${KERNEL_DIR}/fs/susfs.c"
        test -f "${KERNEL_DIR}/fs/zeromount.c"
        test -f "${KERNEL_DIR}/include/linux/susfs.h"
        test -f "${KERNEL_DIR}/include/linux/zeromount.h"

        grep -Eq \
          'obj-\$\(CONFIG_KSU_SUSFS\).*\+=.*susfs\.o' \
          "${KERNEL_DIR}/fs/Makefile"

        grep -Eq \
          'obj-\$\(CONFIG_ZEROMOUNT\).*\+=.*zeromount\.o' \
          "${KERNEL_DIR}/fs/Makefile"

        grep -Eq \
          '^[[:space:]]*config[[:space:]]+ZEROMOUNT' \
          "${KERNEL_DIR}/fs/Kconfig"

        grep -Eq \
          '^[[:space:]]*config[[:space:]]+KSU_SUSFS_SUS_KSTAT_REDIRECT' \
          "${KERNEL_DIR}/fs/Kconfig"

        grep -Rqs \
          'CMD_SUSFS_ADD_SUS_KSTAT_REDIRECT' \
          "${KSU_DIR}/kernel" || {
            echo "::error::KernelSU kstat redirect supercall integration is missing."
            exit 1
          }

        grep -Rqs \
          'susfs_init' \
          "${KSU_DIR}/kernel" || {
            echo "::error::KernelSU SUSFS initialization is missing."
            exit 1
          }

        git -C "$KERNEL_DIR" diff --check
        git -C "$KSU_DIR" diff --check

        echo
        echo "SUSFS and ZeroMount validation completed successfully."
        echo "Kernel target: android14-6.1.145"
